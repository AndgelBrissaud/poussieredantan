name: Docker Publish


on:

  push:

    tags:

      - "v*"





jobs:


  frontend:


    runs-on: ubuntu-latest


    permissions:

      contents: read

      packages: write



    steps:


      - name: Checkout repository

        uses: actions/checkout@v4





      - name: Login GHCR

        uses: docker/login-action@v3

        with:

          registry: ghcr.io

          username: ${{ github.actor }}

          password: ${{ secrets.GITHUB_TOKEN }}





      - name: Build and push frontend

        uses: docker/build-push-action@v6

        with:

          context: .

          file: ./Dockerfile

          push: true


          tags: |

            ghcr.io/andgelbrissaud/poussieredantan:latest

            ghcr.io/andgelbrissaud/poussieredantan:${{ github.ref_name }}






  backend:


    runs-on: ubuntu-latest


    permissions:

      contents: read

      packages: write



    steps:


      - name: Checkout repository

        uses: actions/checkout@v4





      - name: Login GHCR

        uses: docker/login-action@v3

        with:

          registry: ghcr.io

          username: ${{ github.actor }}

          password: ${{ secrets.GITHUB_TOKEN }}







      - name: Build and push backend


        uses: docker/build-push-action@v6


        with:


          context: ./backend


          file: ./backend/Dockerfile


          push: true


          tags: |

            ghcr.io/andgelbrissaud/poussieredantan-backend:latest

            ghcr.io/andgelbrissaud/poussieredantan-backend:${{ github.ref_name }}