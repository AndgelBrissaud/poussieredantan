server {

    listen 80;

    server_name poussieredantan.com www.poussieredantan.com;


    root /usr/share/nginx/html;

    index index.html;



    #
    # Backend Express API
    #

    location /api/ {

        proxy_pass http://backend:3000;


        proxy_http_version 1.1;


        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;


        # Conservation des cookies JWT
        proxy_set_header Cookie $http_cookie;


        # Autorise les réponses avec cookies
        proxy_pass_header Set-Cookie;

    }



    #
    # Images uploadées
    #

    location /uploads/ {

        proxy_pass http://backend:3000;


        proxy_http_version 1.1;


        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

    }



    #
    # Application React SPA
    #

    location / {

        try_files $uri $uri/ /index.html;

    }



    #
    # Cache fichiers statiques
    #

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf)$ {

        expires 30d;

        add_header Cache-Control "public, immutable";

        try_files $uri =404;

    }



    #
    # Compression
    #

    gzip on;

    gzip_vary on;

    gzip_min_length 1000;


    gzip_types

        text/plain

        text/css

        application/javascript

        application/json

        application/xml

        image/svg+xml;

}